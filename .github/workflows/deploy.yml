name: Build & Deploy

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install and Build
        working-directory: server
        run: |
          npm install
          npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: |
            server/dist
            server/package.json
            server/package-lock.json
            server/prisma
            server/src/generated

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install and Build
        working-directory: client
        run: |
          npm install
          npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: client/dist

  deploy:
    runs-on: ubuntu-latest
    needs:
      - build-backend
      - build-frontend
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download backend
        uses: actions/download-artifact@v4
        with:
          name: backend-build
          path: backend-build

      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend-build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.DO_HOST }} >> ~/.ssh/known_hosts

      - name: Upload backend
        run: |
          rsync -avz --delete \
            --exclude='node_modules' \
            backend-build/ ${{ secrets.DO_USER }}@${{ secrets.DO_HOST }}:/var/www/apps/infitech_dashboard/backend/

      - name: Upload frontend
        run: |
          rsync -avz --delete \
            frontend-build/ ${{ secrets.DO_USER }}@${{ secrets.DO_HOST }}:/var/www/apps/infitech_dashboard/frontend/

      - name: Deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          PORT: ${{ secrets.PORT }}
        run: |
          ssh ${{ secrets.DO_USER }}@${{ secrets.DO_HOST }} \
            "cd /var/www/apps/infitech_dashboard/backend && \
             printf 'NODE_ENV=production\nPORT=${{ secrets.PORT }}\nDATABASE_URL=${{ secrets.DATABASE_URL }}\nJWT_SECRET=${{ secrets.JWT_SECRET }}\n' > .env && \
             cat .env && \
             npm install --omit=dev && \
             npx prisma migrate deploy && \
             pm2 restart infitech_dashboard -f || pm2 start dist/index.js --name infitech_dashboard && \
             pm2 save"
